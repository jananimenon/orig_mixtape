<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mixtape</title>

<script src="https://cdn.jsdelivr.net/npm/jsmediatags/dist/jsmediatags.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#011638;
color:#eef0f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* STARS */

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.star{
position:absolute;
width:2px;
height:2px;
background:#eef0f2;
border-radius:50%;
opacity:.7;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}

/* PLAYER */

.player{
width:92%;
max-width:420px;
background:#141414;
border-radius:20px;
padding:24px;
box-shadow:0 0 40px rgba(0,0,0,.6);
position:relative;
z-index:2;
display:flex;
flex-direction:column;
gap:18px;
}

/* ARTWORK */

.art{
width:100%;
aspect-ratio:1;
background:#000;
border-radius:12px;
background-size:cover;
background-position:center;
box-shadow:0 0 25px rgba(13,33,161,.5);
}

/* SONG INFO */

.title{
font-size:18px;
font-weight:600;
}

.artist{
font-size:14px;
opacity:.7;
}

/* CONTROLS */

.controls{
display:flex;
justify-content:center;
gap:10px;
}

button{
background:#0d21a1;
border:none;
padding:10px 14px;
border-radius:10px;
color:#eef0f2;
font-size:14px;
cursor:pointer;
}

/* PLAYLIST */

.playlist{
max-height:200px;
overflow-y:auto;
border-top:1px solid rgba(255,255,255,.1);
padding-top:10px;
}

.song{
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.song:hover{
background:#0d21a1;
}

</style>

</head>

<body>

<div class="stars" id="stars"></div>

<div class="player">

<div class="art" id="artwork"></div>

<div>

<div class="title" id="title">Mixtape</div>

<div class="artist" id="artist"></div>

</div>

<div class="controls">

<button onclick="prevSong()">◀</button>

<button onclick="togglePlay()">Play / Pause</button>

<button onclick="nextSong()">▶</button>

<button onclick="shuffleSong()">Shuffle</button>

</div>

<div class="playlist" id="songlist"></div>

<audio id="audio"></audio>

</div>

<script>

/* STAR FIELD */

const starContainer=document.getElementById("stars")

for(let i=0;i<120;i++){

let star=document.createElement("div")

star.className="star"

star.style.left=Math.random()*100+"%"
star.style.top=Math.random()*100+"%"
star.style.animationDelay=Math.random()*3+"s"

starContainer.appendChild(star)

}

/* SONG LIST */

const songs=[

{url:encodeURI("Begum Akhtar - Yeh Na Thi Humari Qismat.mp3")},
{url:encodeURI("Begum Akhtar - Woh Jo Ham Mein Tum Mein.mp3")},
{url:encodeURI("Begum Akhtar - Mere Humnafas Mere Humnava.mp3")},
{url:encodeURI("Begum Akhtar - Aye mohabat tere anjam pe rona aaya.mp3")}

]

let currentIndex=0

const audio=document.getElementById("audio")
const artwork=document.getElementById("artwork")
const title=document.getElementById("title")
const artist=document.getElementById("artist")
const list=document.getElementById("songlist")

/* BUILD PLAYLIST */

songs.forEach((song,i)=>{

let name=song.url
.split("/")
.pop()
.replace(".mp3","")
.replace(/%20/g," ")

let div=document.createElement("div")

div.className="song"

div.innerText=name

div.onclick=()=>playSong(i)

list.appendChild(div)

})

/* PLAY SONG */

function playSong(i){

currentIndex=i

audio.src=songs[i].url

audio.play()

let fallback=songs[i].url
.split("/")
.pop()
.replace(".mp3","")
.replace(/%20/g," ")

title.innerText=fallback
artist.innerText=""

/* TRY READING METADATA */

jsmediatags.read(songs[i].url,{

onSuccess:function(tag){

let t=tag.tags

if(t.title) title.innerText=t.title
if(t.artist) artist.innerText=t.artist

if(t.picture){

let bytes=new Uint8Array(t.picture.data)

let blob=new Blob([bytes],{type:t.picture.format})

let url=URL.createObjectURL(blob)

artwork.style.backgroundImage=`url(${url})`

}

}

})

}

/* PLAY PAUSE */

function togglePlay(){

if(audio.paused){
audio.play()
}else{
audio.pause()
}

}

/* NEXT */

function nextSong(){

currentIndex++

if(currentIndex>=songs.length)currentIndex=0

playSong(currentIndex)

}

/* PREVIOUS */

function prevSong(){

currentIndex--

if(currentIndex<0)currentIndex=songs.length-1

playSong(currentIndex)

}

/* SHUFFLE */

function shuffleSong(){

let rand=Math.floor(Math.random()*songs.length)

playSong(rand)

}

/* AUTOPLAY NEXT */

audio.addEventListener("ended",()=>{

nextSong()

})

/* AUTOSTART */

window.onload=()=>{

playSong(0)

}

</script>

</body>
</html>
